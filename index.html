<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS 프로젝트 비교표 Pro</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>QS 프로젝트 비교표</h1>
      <button id="btn-reset" class="btn btn-ghost">초기화</button>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 데이터 업로드</button>
        <button class="tab" data-tab="mapping">2. 설정 (동/아이템)</button>
        <button class="tab" data-tab="compare">3. 동별 비교표</button>
      </section>

      <section id="tab-upload" class="tab-panel is-active">
        <div class="panel">
          <div class="upload-grid">
            <div class="upload-card"><strong>현재 프로젝트</strong><input type="file" id="file-current" multiple /><div id="list-current" class="file-list"></div></div>
            <div class="upload-card"><strong>유사 A</strong><input type="file" id="file-a" multiple /><div id="list-a" class="file-list"></div></div>
            <div class="upload-card"><strong>유사 B</strong><input type="file" id="file-b" multiple /><div id="list-b" class="file-list"></div></div>
            <div class="upload-card"><strong>유사 C</strong><input type="file" id="file-c" multiple /><div id="list-c" class="file-list"></div></div>
          </div>
          <button id="btn-parse" class="btn btn-primary" style="width:100%; margin-top:20px;">데이터 분석 시작</button>
          <div id="upload-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-mapping" class="tab-panel">
        <div class="panel">
          <div class="sub-tabs">
            <button class="sub-tab is-active" data-sub="sub-dong">동 명칭 통일 관리</button>
            <button class="sub-tab" data-sub="sub-item">아이템 통일 관리</button>
          </div>

          <div id="sub-dong" class="sub-panel is-active">
            <div class="toolbar"><p>각 프로젝트의 동 명칭을 표준 명칭으로 매핑하세요.</p></div>
            <div id="dong-mapping-list" class="mapping-list"></div>
          </div>

          <div id="sub-item" class="sub-panel">
            <div class="toolbar">
              <input type="text" id="mapping-search" class="input" placeholder="아이템 검색..." />
              <button id="btn-merge" class="btn btn-secondary">그룹 병합</button>
              <button id="btn-apply-all" class="btn btn-primary">최종 적용</button>
            </div>
            <div class="list-header">
              <div class="col-check">선택</div>
              <div class="col-orig">프로젝트별 원본 (현재 / A / B / C)</div>
              <div class="col-edit">통일명 (표준)</div>
              <div class="col-cat">중분류</div>
            </div>
            <div id="mapping-group-list" class="mapping-list"></div>
          </div>
        </div>
      </section>

      <section id="tab-compare" class="tab-panel">
        <div class="panel">
          <div class="toolbar">
            <select id="filter-dong" class="input"></select>
            <select id="filter-category" class="input">
              <option value="all">중분류 전체</option>
              <option value="콘크리트">콘크리트</option>
              <option value="거푸집">거푸집</option>
              <option value="철근">철근</option>
              <option value="잡/기타">잡/기타</option>
            </select>
          </div>
          <div id="compare-card-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
