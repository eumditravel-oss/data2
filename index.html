<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS 프로젝트 비교표</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__title">
        <h1>QS 프로젝트 비교표</h1>
        <p>현재 프로젝트와 유사 프로젝트 3개의 데이터를 비교합니다.</p>
      </div>
      <div class="topbar__actions">
        <button id="btn-reset" class="btn btn-ghost">초기화</button>
      </div>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 데이터 업로드</button>
        <button class="tab" data-tab="mapping">2. 아이템 통일 설정</button>
        <button class="tab" data-tab="compare">3. 동별 비교표</button>
      </section>

      <section id="tab-upload" class="tab-panel is-active">
        <div class="panel">
          <div class="upload-grid">
            <div class="upload-card">
              <div class="upload-card__head"><strong>현재 프로젝트</strong></div>
              <label class="filebox"><input type="file" id="file-current" multiple /><span class="filebox__btn">파일 선택</span></label>
              <div class="file-list" id="list-current"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>A 프로젝트</strong></div>
              <label class="filebox"><input type="file" id="file-a" multiple /><span class="filebox__btn">파일 선택</span></label>
              <div class="file-list" id="list-a"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>B 프로젝트</strong></div>
              <label class="filebox"><input type="file" id="file-b" multiple /><span class="filebox__btn">파일 선택</span></label>
              <div class="file-list" id="list-b"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>C 프로젝트</strong></div>
              <label class="filebox"><input type="file" id="file-c" multiple /><span class="filebox__btn">파일 선택</span></label>
              <div class="file-list" id="list-c"></div>
            </div>
          </div>
          <div class="panel__foot">
            <button id="btn-parse" class="btn btn-primary">EXCEL 읽기 및 아이템 추출</button>
          </div>
          <div id="upload-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-mapping" class="tab-panel">
        <div class="panel">
          <div class="panel__head">
            <div class="toolbar">
              <input type="text" id="mapping-search" class="input" placeholder="아이템 검색" />
              <button id="btn-apply-mapping" class="btn btn-primary">통일명 적용</button>
            </div>
          </div>
          <div id="mapping-group-list" class="mapping-group-list"></div>
          <datalist id="canonical-options"></datalist>
          <div id="mapping-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-compare" class="tab-panel">
        <div class="panel">
          <div class="panel__head">
            <div class="toolbar toolbar-wrap">
              <select id="filter-dong" class="input"></select>
              <select id="filter-category" class="input">
                <option value="all">중분류 전체</option>
                <option value="콘크리트">콘크리트</option>
                <option value="거푸집">거푸집</option>
                <option value="철근">철근</option>
                <option value="잡/기타">잡/기타</option>
              </select>
              <input type="text" id="filter-item" class="input" placeholder="아이템 검색" />
              <select id="filter-mode" class="input">
                <option value="all">전체 보기</option>
                <option value="ratio">비율 강조</option>
              </select>
            </div>
          </div>
          <div class="summary-cards" id="summary-cards"></div>
          <div id="compare-card-list" class="compare-card-list"></div>
          <div id="compare-status" class="status-box"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
