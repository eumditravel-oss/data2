<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>QS 프로젝트 비교표</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>QS 프로젝트 비교표</h1>
      <button id="btn-reset" class="btn btn-ghost">초기화</button>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 데이터 업로드</button>
        <button class="tab" data-tab="mapping">2. 아이템 통일 설정</button>
        <button class="tab" data-tab="compare">3. 동별 비교표</button>
      </section>

      <section id="tab-upload" class="tab-panel is-active">
        <div class="panel">
          <div class="upload-grid">
            <div class="upload-card"><strong>현재 프로젝트</strong><input type="file" id="file-current" multiple /><div id="name-current"></div></div>
            <div class="upload-card"><strong>A 프로젝트</strong><input type="file" id="file-a" multiple /><div id="name-a"></div></div>
            <div class="upload-card"><strong>B 프로젝트</strong><input type="file" id="file-b" multiple /><div id="name-b"></div></div>
            <div class="upload-card"><strong>C 프로젝트</strong><input type="file" id="file-c" multiple /><div id="name-c"></div></div>
          </div>
          <button id="btn-parse" class="btn btn-primary">EXCEL 읽기 및 아이템 추출</button>
          <div id="upload-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-mapping" class="tab-panel">
        <div class="panel">
          <div class="toolbar">
            <input type="text" id="mapping-search" class="input" placeholder="아이템 검색..." />
            <button id="btn-apply-mapping" class="btn btn-primary">통일명 및 분류 적용</button>
          </div>
          <div id="mapping-group-list" class="mapping-group-list"></div>
          <div id="mapping-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-compare" class="tab-panel">
        <div class="panel">
          <div class="toolbar">
            <select id="filter-dong" class="input"></select>
            <select id="filter-category" class="input">
              <option value="all">중분류 전체</option>
              <option value="콘크리트">콘크리트</option>
              <option value="거푸집">거푸집</option>
              <option value="철근">철근</option>
              <option value="잡/기타">잡/기타</option>
            </select>
            <input type="text" id="filter-item" class="input" placeholder="결과 내 검색..." />
          </div>
          <div id="compare-card-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
