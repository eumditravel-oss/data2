<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS 프로젝트 비교표</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__title">
        <h1>QS 프로젝트 비교표</h1>
        <p>프로젝트별 수량을 비교하고 대/중분류를 설정합니다.</p>
      </div>
      <div class="topbar__actions">
        <button id="btn-reset" class="btn btn-ghost">초기화</button>
      </div>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 데이터 업로드</button>
        <button class="tab" data-tab="mapping">2. 아이템 통일 설정</button>
        <button class="tab" data-tab="compare">3. 동별 비교표</button>
      </section>

      <section id="tab-upload" class="tab-panel is-active">
        <div class="panel">
          <div class="upload-grid">
            <div class="upload-card">
              <div class="upload-card__head"><strong>현재 프로젝트</strong></div>
              <label class="filebox">
                <input type="file" id="file-current" multiple />
                <span class="filebox__btn">파일 선택</span>
                <span id="name-current">선택된 파일 없음</span>
              </label>
              <div id="list-current" class="file-list"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>A 프로젝트</strong></div>
              <label class="filebox">
                <input type="file" id="file-a" multiple />
                <span class="filebox__btn">파일 선택</span>
                <span id="name-a">선택된 파일 없음</span>
              </label>
              <div id="list-a" class="file-list"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>B 프로젝트</strong></div>
              <label class="filebox">
                <input type="file" id="file-b" multiple />
                <span class="filebox__btn">파일 선택</span>
                <span id="name-b">선택된 파일 없음</span>
              </label>
              <div id="list-b" class="file-list"></div>
            </div>
            <div class="upload-card">
              <div class="upload-card__head"><strong>C 프로젝트</strong></div>
              <label class="filebox">
                <input type="file" id="file-c" multiple />
                <span class="filebox__btn">파일 선택</span>
                <span id="name-c">선택된 파일 없음</span>
              </label>
              <div id="list-c" class="file-list"></div>
            </div>
          </div>
          <div class="panel__foot">
            <button id="btn-parse" class="btn btn-primary">EXCEL 분석 시작</button>
          </div>
          <div id="upload-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-mapping" class="tab-panel">
        <div class="panel">
          <div class="panel__head">
            <div class="toolbar">
              <input type="text" id="mapping-search" class="input" placeholder="아이템 검색" />
              <button id="btn-merge-groups" class="btn btn-secondary">선택 그룹 병합</button>
              <button id="btn-split-items" class="btn btn-secondary">선택 아이템 분리</button>
              <button id="btn-apply-mapping" class="btn btn-primary">설정 완료 및 적용</button>
            </div>
          </div>
          <div id="mapping-group-list" class="mapping-group-list"></div>
          <div id="mapping-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-compare" class="tab-panel">
        <div class="panel">
          <div class="panel__head">
            <div class="toolbar toolbar-wrap">
              <select id="filter-type" class="input">
                <option value="all">대분류 전체</option>
                <option value="APT">APT</option>
                <option value="PIT">PIT</option>
                <option value="주차장">주차장</option>
                <option value="부속동">부속동</option>
              </select>
              <select id="filter-dong" class="input"></select>
              <select id="filter-category" class="input">
                <option value="all">중분류 전체</option>
                <option value="콘크리트">콘크리트</option>
                <option value="거푸집">거푸집</option>
                <option value="철근">철근</option>
                <option value="잡/기타">잡/기타</option>
              </select>
            </div>
          </div>
          <div id="compare-card-list" class="compare-card-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
