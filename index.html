<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS 단일 프로젝트 분석기</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__title">
        <h1>QS 단일 프로젝트 분석</h1>
        <p>동별 대분류 및 층별 톤당 루베(Ton/m³) 정밀 분석 도구</p>
      </div>
      <div class="topbar__actions">
        <button id="btn-reset" class="btn btn-ghost" onclick="location.reload()">초기화</button>
      </div>
    </header>

    <main class="page">
      <section class="tabs">
        <button class="tab is-active" data-tab="upload">1. 데이터 업로드</button>
        <button class="tab" data-tab="mapping">2. 아이템 분류 설정</button>
        <button class="tab" data-tab="view">3. 동별 상세 수량표</button>
      </section>

      <section id="tab-upload" class="tab-panel is-active">
        <div class="panel">
          <div class="upload-box">
            <h3>프로젝트 엑셀 업로드</h3>
            <p>분석할 파일을 선택하세요. (여러 파일 동시 선택 가능)</p>
            <label class="filebox">
              <input type="file" id="file-main" multiple onchange="updateFiles()"/>
              <span class="filebox__btn">파일 선택</span>
            </label>
            <div id="file-list" class="file-list"></div>
          </div>
          <button id="btn-parse" class="btn btn-primary" style="width:100%; margin-top:20px; height:54px; font-size:16px;">데이터 정밀 분석 시작</button>
          <div id="upload-status" class="status-box"></div>
        </div>
      </section>

      <section id="tab-mapping" class="tab-panel">
        <div class="panel">
          <div class="toolbar">
            <div class="toolbar__title">
              <h3>아이템 분류 및 명칭 설정</h3>
              <p>추출된 아이템의 중분류를 확인하세요. (예측 알고리즘 적용됨)</p>
            </div>
            <button id="btn-apply" class="btn btn-primary" style="margin-left:auto;">설정 완료 및 수량표 생성</button>
          </div>
          <div class="list-header">
            <div style="width:60px; text-align:center;">번호</div>
            <div style="flex:1; padding-left:10px;">추출된 원본 아이템 명칭</div>
            <div style="width:250px;">표준화 명칭</div>
            <div style="width:180px;">중분류 분류</div>
          </div>
          <div id="mapping-list" class="mapping-list">
            </div>
        </div>
      </section>

      <section id="tab-view" class="tab-panel">
        <div id="dong-summary" class="summary-container"></div>

        <div class="panel">
          <div class="toolbar">
            <div class="filter-group">
              <label>대분류(동) 선택:</label>
              <select id="filter-dong" class="input" style="width:220px;"></select>
            </div>
            <button id="btn-excel" class="btn btn-success" style="margin-left:auto;">Excel 내보내기</button>
          </div>
          
          <div class="excel-view-container">
            <table id="main-excel-table" class="excel-table">
              <thead><tr id="table-header-row"></tr></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    function updateFiles() {
      const files = Array.from(document.getElementById('file-main').files);
      document.getElementById('file-list').innerHTML = files.map(f=>`<span class="file-chip">${f.name}</span>`).join('');
    }
  </script>
</body>
</html>
